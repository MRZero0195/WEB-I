<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothing Shop</title>
    <link rel="stylesheet" href="body.css">
</head>
<body>
    <header>
        <h1>Fashion Hub</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="product-list">
            <h2>Our Collection</h2>
            <div class="product" data-price="29.99">
                <img src="images/tshirt.jpg" alt="T-Shirt">
                <h3>T-Shirt</h3>
                <p>$29.99</p>
                <button onclick="addToCart('T-Shirt', 29.99)">Add to Cart</button>
            </div>
            <div class="product" data-price="49.99">
                <img src="images/jacket.jpg" alt="Jacket">
                <h3>Jacket</h3>
                <p>$49.99</p>
                <button onclick="addToCart('Jacket', 49.99)">Add to Cart</button>
            </div>
            <div class="product" data-price="19.99">
                <img src="images/shorts.jpg" alt="Shorts">
                <h3>Shorts</h3>
                <p>$19.99</p>
                <button onclick="addToCart('Shorts', 19.99)">Add to Cart</button>
            </div>
        </section>

        <aside id="cart">
            <h2>Your Cart</h2>
            <ul id="cart-items"></ul>
            <p id="total">Total: $0.00</p>
        </aside>
    </main>

    <footer>
        <p>&copy; 2023 Fashion Hub</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
