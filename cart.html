<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Cart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

/* HEADER SAME STYLE */
.header{
    background:#1a1a1a;
    color:white;
    padding:25px;
    text-align:center;
    position:relative;
}

.header a{
    position:absolute;
    left:30px;
    top:25px;
    color:white;
    text-decoration:none;
    font-weight:bold;
}

/* GRID SAME AS COLLECTION */
.cart-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    padding:40px;
}

/* CARD SAME STYLE */
.card{
    background:white;
    padding:15px;
    border-radius:8px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:6px;
}

.card h3{
    margin:10px 0;
}

.card p{
    font-size:16px;
}

/* BUTTON STYLE SAME */
button{
    margin-top:8px;
    padding:10px;
    width:90%;
    border:none;
    background:#1a1a1a;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#444;
}

/* EMPTY TEXT */
.empty{
    text-align:center;
    font-size:20px;
    margin-top:50px;
}
</style>
</head>

<body>

<div class="header">
    <a href="collection.html">⬅ Back</a>
    <h1>🛒 Your Cart</h1>
</div>

<div class="cart-container" id="cartBox"></div>

<script>
function loadCart() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let box = document.getElementById("cartBox");

    console.log(cart); // ✅ DEBUG (see if data exists)

    if (!Array.isArray(cart) || cart.length === 0) {
        box.innerHTML = "<div class='empty'>Your cart is empty</div>";
        return;
    }

    box.innerHTML = "";

    cart.forEach((item, index) => {

        // ✅ SAFE VALUES (fix 'no info' issue)
        let name = item?.name || "No Name";
        let price = item?.price || 0;
        let img = item?.img || "https://via.placeholder.com/200";

        box.innerHTML += `
        <div class="card">

            <div onclick="viewProduct(${index})" style="cursor:pointer;">
                <img src="${img}">
                <h3>${name}</h3>
            </div>

            <p>$${price}</p>

            <button onclick="removeItem(${index})">Remove</button>
        </div>
        `;
    });
}

function removeItem(index){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.splice(index,1);

    localStorage.setItem("cart",JSON.stringify(cart));

    loadCart();
}

function viewProduct(index){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    if(!cart[index]){
        alert("Product missing!");
        return;
    }

    localStorage.setItem("selectedProduct",JSON.stringify(cart[index]));
    window.location.href = "product.html";
}

// ✅ LOAD AFTER PAGE READY
window.onload = loadCart;
</script>

</body>
</html>
