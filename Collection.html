<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leather Jacket Collection</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
        }

        .header {
            padding: 30px;
            background-color: #1a1a1a;
            color: white;
            position: relative;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .search-box {
            margin-top: 15px;
            position: absolute;
            right: 30px;
            top: 30px;
            }

        .search-box input {
            width: 500px;
            padding: 12px 15px 12px 45px; 
            border-radius: 30px;
            border: 1px solid #ddd;
            outline: none;
            transition: 0.25s ease;
            font-size: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .search-box input:focus {
            border-color: #4285f4;
            box-shadow: 0 4px 12px rgba(66,133,244,0.3);
        }

        .search-box::before {
            content: "BF";
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: bold;
            font-size: 18px;
            font-family: Segoe UI, sans-serif;
            background: linear-gradient(45deg, #4285F4, #EA4335, #FBBC05, #34A853);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            pointer-events: none;
        }

        .collection {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s ease forwards;
        }
        .card:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }       
        .card:nth-child() {
            opacity: 0;
            transform: translateY(40px);
            animation: fadeUp 0.6s ease forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card img {
            width: 100%;
            height: fit-content;
            object-fit: cover;
            border-radius: 6px;
        }

        .card h3 {
            margin: 10px 0;
        }

        .card p {
            font-size: 18px;
            color: #333;
        }

        .card a {
            text-decoration: none;
        }

        .card button {
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #1a1a1a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .card button:hover {
            background-color: #444;
        }
        a {
             text-decoration: none;
             font-family: 'Playfair Display', serif;
            font-size: 30px;
            color: white;
        }

        
    </style>
</head>

<body>

<header class="header">
    <a href="buffalofit.html"><div class="logo">BUFFALO fit</div></a>
    <h1>Leather Jacket Collection</h1>
    <p>Premium Style • Classic Comfort</p>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search jackets..." onkeyup="searchProduct()">
    </div>
</header>

<section class="collection" id="productList">
<header>    
    <a href="cart.html" style="color:black; font-weight:bold;">
        🛒 Go to Cart
    </a>
</header>
    <div class="card" data-name="classic black jacket">
        <img src="leather.jpg" alt="Black Leather Jacket">
        <h3>Classic Black Jacket</h3>
        <p>$120</p>
        <button onclick="openProduct(1)">View Details</button>
    </div>

    <div class="card" data-name="brown rider jacket">
        <img src="men.jpg" alt="Brown Leather Jacket">
        <h3>Brown Rider Jacket</h3>
        <p>$140</p>
        <button onclick="openProduct(2)">View Details</button>
    </div>

    <div class="card" data-name="vintage leather jacket">
        <img src="download.jpg" alt="Vintage Jacket">
        <h3>Vintage Leather Jacket</h3>
        <p>$160</p>
        <button onclick="openProduct(3)">View Details</button>

    </div>


</section>
<script>
const products = {
    1: {
        name: "Classic Black Jacket",
        price: 120,
        img: "leather.jpg",
        collection: "Leather Jackets"
    },
    2: {
        name: "Brown Rider Jacket",
        price: 140,
        img: "men.jpg",
        collection: "Leather Jackets"
    },
    3: {
        name: "Vintage Leather Jacket",
        price: 160,
        img: "download.jpg",
        collection: "Leather Jackets"
    }
};

function openProduct(id) {
    localStorage.setItem("selectedProduct", JSON.stringify(products[id]));
    window.location.href = "product.html";
}

function searchProduct() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let name = card.getAttribute("data-name");
        card.style.display = name.includes(input) ? "block" : "none";
    });
}
</script>

</body>
</html>
