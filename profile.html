<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f2f4f7;
}

.navbar {
    display: flex;
    align-items: center;
    background: #1a1a1a;
    padding: 12px;
}

.navbar a {
    color: white;
    margin-right: 15px;
    text-decoration: none;
}

.logout-btn {
    margin-left: auto;
}
.content {
    width: 60%;
    margin: 30px auto;
    background: white;
    padding: 20px;
}
input {
    width: 100%;
    padding: 8px;
    margin: 6px 0;
}
</style>
</head>

<body>

<div class="navbar">
    <<a href="buffalofit.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html">Profile</a>
    <a href="settings.html">Settings</a>
    <a href="report.html">Reports</a>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="content">
    <h2>Profile</h2>

    <p>User: <span id="user"></span></p>

    <input id="username" placeholder="Username">
    <input id="email" placeholder="Email">
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [
    { username: "demo", email: "demo@gmail.com" }
];

let user = users[0];

document.getElementById("user").innerText = user.username;
document.getElementById("username").value = user.username;
document.getElementById("email").value = user.email;

function save() {
    user.username = document.getElementById("username").value;
    user.email = document.getElementById("email").value;

    localStorage.setItem("users", JSON.stringify(users));

    document.getElementById("user").innerText = user.username;
}

document.getElementById("username").addEventListener("input", save);
document.getElementById("email").addEventListener("input", save);

function logout() {
    alert("Logout clicked");
}
</script>

</body>
</html>
